services:

  portainer:
    container_name: portainer
    restart: always
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data/portainer

  leadmanager.logging-ingestion:
    container_name: leadmanagerseq
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - "Logging:SeqIngestionSink:ServerUrl=http://leadmanagerseq:5341"
    ports:
      - "5341:5341"
      - "7999:80"
    volumes:
      - seq_data:/var/opt/seq

  leadmanager.db:
    container_name: leadmanagerdb
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Y0urStr0nGP@sswoRD_2023
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql

  iamserver.db:
    container_name: iamserverdb
    restart: always
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=pointOfN0_Return
      - MONGO_INITDB_DATABASE=IamDb
    volumes:
      - iamdb_data:/data/db

  leadmanager.messagebus:
    container_name: leadmanagermessagebus
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - messagebus_data:/var/opt/rabbitmq

  leadmanager.blob:
    container_name: leadmanagerblob
    restart: always
    environment:
      - BLOBHOST=0.0.0.0
    ports:
      - "10000:10000"
    volumes:
      - blob_data:/var/data/blob

  leadmanager.caching:
    container_name: leadmanagercache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - caching_data:/var/data/caching

  iamserver:
    container_name: iamserver
    depends_on:
      - iamserver.db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=q1w2e3r4t5
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - "DataSourceSettings:ConnectionString=mongodb://root:pointOfN0_Return@iamserverdb/IamDb?authSource=admin"
      - "IAMServerSettings__Clients__1__RedirectUris__0=https://localhost:8543/auth-callback"
      - "IAMServerSettings__Clients__1__PostLogoutRedirectUris__0=https://localhost:8543/user-logged-out"
      - "IAMServerSettings__Clients__1__AllowedCorsOrigins__0=https://localhost:8543"
      - "LeadWebAppClientSettings__BaseUrl=https://localhost:8543"
    ports:
      - "8003:80"
      - "8643:443"
    volumes:
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  leadmanager.web:
    container_name: leadmanagerweb
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=q1w2e3r4t5
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
  #   - ASPNETCORE_HTTP_PORTS=8002
  #   - ASPNETCORE_HTTPS_PORTS=8543
    ports:
      - "8002:80"
      - "8543:443"

  leadmanager.api:
    container_name: leadmanagerapi
    depends_on:
      - leadmanager.db
      - leadmanager.messagebus
      - leadmanager.logging-ingestion
      - leadmanager.blob
      - leadmanager.caching
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=q1w2e3r4t5
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - "LeadManagerApiSettings:Cors_AllowedOrigins=https://localhost:8543/api/auditing/logins/log,https://localhost:8543,http://localhost:8002"
      - "LeadManagerApiSettings:ApiKeyRequestHeaderValue=74ynfkjy487yue47j"
      - "Logging:FileSink:LogFilePath=/data/app/logs/applogs.log"
      - "DataSourceSettings:ConnectionString=Server=leadmanagerdb;Database=LeadManager;User id=sa;Password=Y0urStr0nGP@sswoRD_2023;MultipleActiveResultSets=true;Connect timeout=30;TrustServerCertificate=True"
      - "AzureStorageProviderSettings:ConnectionString=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://leadmanagerblob"
      - "AzureStorageProviderSettings:ContainerName=lead-manager"
      - "AzureStorageProviderSettings:StorageFolderPath=/data/blob/content"
      - "RedisCacheProviderSettings:Server=leadmanagercache"
      - "RabbitMqConnectionSettings:HostName=leadmanagermessagebus"
      - "RabbitMqConnectionSettings:PortNumber=5672"
      - "RabbitMqConnectionSettings:UserName=guest"
      - "RabbitMqConnectionSettings:Password=guest"
      - "RabbitMqConnectionSettings:VirtualHost=/"
      - "RabbitMqConnectionSettings:ClientProvidedName=lead-manager"
      - "JwtAuthenticationProviderSettings:AuthorityBaseUrl=https://localhost:8643"
    ports:
      - "8001:80"
      - "8443:443"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
      - ~/.aspnet/https:/https:ro