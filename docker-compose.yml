version: '3.4'

services:

  portainer:
    image: portainer/portainer-ce

  leadmanager.logging-ingestion:
    image: datalust/seq:2023.4

  leadmanager.telemetry:
    image: prom/prometheus:v2.45.3

  leadmanager.telemetry.node-exporter:
    image: prom/node-exporter:v1.7.0

  leadmanager.telemetry.alert-manager:
    image: prom/alertmanager:v0.26.0

  leadmanager.telemetry.dashboard:
    image: grafana/grafana:10.3.1-ubuntu

  leadmanager.db:
    image: mcr.microsoft.com/mssql/server

  leadmanager.blob:
    image: mcr.microsoft.com/azure-storage/azurite

  leadmanager.caching:
    image: redis:7.0.12-alpine

  leadmanager.messagebus:
    image: rabbitmq:3-management

  leadmanager.client:
    image: cristianomartinsdiasspbr1982/leadmanagerweb:v1.0.3
    
  leadmanager.api:
    container_name: leadmanagerapi
    image: ${DOCKER_REGISTRY-}leadmanagerapi
    build:
      context: .
      dockerfile: src/hosts/LeadManagerApi/Dockerfile

volumes:
  db_data:
  messagebus_data:
  blob_data:
  caching_data:
  portainer_data:
  seq_data:
  telemetry_data:
  telemetry_alertmanager_data: